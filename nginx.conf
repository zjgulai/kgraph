# DocCanvas reverse proxy include for Nginx's `http` context.
# Install only after replacing server_name and validating with `nginx -t`.
# TLS and HSTS remain an explicit production gate; they are not fake-enabled here.

map $request_method $doccanvas_write_key {
    default "";
    POST    $binary_remote_addr;
    PUT     $binary_remote_addr;
    PATCH   $binary_remote_addr;
    DELETE  $binary_remote_addr;
}

limit_req_zone $doccanvas_write_key zone=doccanvas_write:10m rate=10r/m;

server {
    listen 80;
    server_name _;  # Replace with the reviewed production domain.
    server_tokens off;

    client_max_body_size 3m;
    client_header_timeout 10s;
    client_body_timeout 15s;
    keepalive_timeout 30s;
    send_timeout 60s;

    limit_req zone=doccanvas_write burst=5 nodelay;
    limit_req_status 429;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_hide_header X-Powered-By;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /api/health {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_hide_header X-Powered-By;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        access_log off;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
