name: doccanvas-kgraph

services:
  app:
    image: ${DOCCANVAS_IMAGE:?set DOCCANVAS_IMAGE to an immutable release tag}
    platform: linux/amd64
    user: "10001:10001"
    environment:
      NODE_ENV: production
      DOCUMENT_PATH_MODE: prod
      DOCCANVAS_ROOT: /data
      DOCCANVAS_WRITE_MODE: owner
      DOCCANVAS_ADMIN_TOKEN_FILE: /run/secrets/doccanvas_owner_token
      DOCCANVAS_SESSION_SECRET_FILE: /run/secrets/doccanvas_session_secret
      PORT: "3200"
      HOSTNAME: 0.0.0.0
    volumes:
      - type: bind
        source: ${DOCCANVAS_DATA_ROOT:?set DOCCANVAS_DATA_ROOT}
        target: /data
        read_only: false
    secrets:
      - source: doccanvas_owner_token
        target: doccanvas_owner_token
        uid: "10001"
        gid: "10001"
        mode: 0400
      - source: doccanvas_session_secret
        target: doccanvas_session_secret
        uid: "10001"
        gid: "10001"
        mode: 0400
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m,uid=10001,gid=10001,mode=1770
      - /app/.next/cache:rw,noexec,nosuid,nodev,size=32m,uid=10001,gid=10001,mode=0770
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 768m
    cpus: 1.0
    pids_limit: 128
    restart: unless-stopped
    stop_grace_period: 20s
    networks:
      internal:
        aliases:
          - doccanvas-kgraph-app-internal
    healthcheck:
      disable: true
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"

  edge:
    image: nginx@sha256:5616878291a2eed594aee8db4dade5878cf7edcb475e59193904b198d9b830de
    platform: linux/amd64
    user: "101:101"
    entrypoint: ["nginx"]
    command: ["-c", "/etc/doccanvas-edge/nginx.conf", "-g", "daemon off;"]
    configs:
      - source: edge_nginx
        target: /etc/doccanvas-edge/nginx.conf
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m,uid=101,gid=101,mode=1770
      - /var/cache/nginx:rw,noexec,nosuid,nodev,size=16m,uid=101,gid=101,mode=0770
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 64m
    cpus: 0.25
    pids_limit: 32
    restart: unless-stopped
    stop_grace_period: 10s
    depends_on:
      app:
        condition: service_started
    networks:
      internal: {}
      proxy:
        aliases:
          - doccanvas-kgraph-edge
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          body="$$(wget -qO- --header='Host: kgraph.lute-tlz-dddd.top' http://127.0.0.1:8080/_edge_health)" &&
          printf '%s' "$$body" | grep -q '"status":"ok"' &&
          printf '%s' "$$body" | grep -q '"mode":"owner"' &&
          printf '%s' "$$body" | grep -q '"configured":true'
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 4
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"

configs:
  edge_nginx:
    file: ./edge.nginx.conf

secrets:
  doccanvas_owner_token:
    file: ${DOCCANVAS_OWNER_TOKEN_FILE:?set DOCCANVAS_OWNER_TOKEN_FILE}
  doccanvas_session_secret:
    file: ${DOCCANVAS_SESSION_SECRET_FILE:?set DOCCANVAS_SESSION_SECRET_FILE}

networks:
  internal:
    internal: true
  proxy:
    external: true
    name: lighthouse_ai_video_net
