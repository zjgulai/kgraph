pid /tmp/nginx.pid;
worker_processes 1;
error_log /dev/stderr warn;

events {
  worker_connections 256;
}

http {
  access_log /dev/stdout combined;
  resolver 127.0.0.11 valid=10s ipv6=off;
  server_tokens off;

  map $host $doccanvas_host_allowed {
    default 0;
    kgraph.lute-tlz-dddd.top 1;
  }

  server {
    listen 8080 default_server;
    client_max_body_size 3m;
    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy;

    if ($doccanvas_host_allowed = 0) { return 444; }

    set $app_upstream http://doccanvas-kgraph-app-internal:3200;

    location = /_edge_health {
      proxy_pass $app_upstream/api/health;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 3s;
      proxy_read_timeout 5s;
    }

    location / {
      proxy_pass $app_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_buffering off;
      proxy_connect_timeout 5s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
    }
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }
}
