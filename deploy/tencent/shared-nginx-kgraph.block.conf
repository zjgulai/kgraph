# BEGIN DOCCANVAS_KGRAPH
map $request_method $doccanvas_write_key {
  default "";
  POST $binary_remote_addr;
  PATCH $binary_remote_addr;
  PUT $binary_remote_addr;
  DELETE $binary_remote_addr;
}
limit_req_zone $doccanvas_write_key zone=doccanvas_write:1m rate=10r/m;

server {
  listen 443 ssl http2;
  server_name kgraph.lute-tlz-dddd.top;

  ssl_certificate /etc/letsencrypt/live/kgraph.lute-tlz-dddd.top/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/kgraph.lute-tlz-dddd.top/privkey.pem;

  client_max_body_size 3m;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy no-referrer always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  location / {
    limit_req zone=doccanvas_write burst=3 nodelay;
    proxy_pass http://doccanvas-kgraph-edge:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }
}
# END DOCCANVAS_KGRAPH
